server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/users/ {
        proxy_pass http://user-service:2700/;
    }

    location /api/books/ {
        proxy_pass http://book-service:2600/;
    }
}
