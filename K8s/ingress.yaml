apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: library-ingress-books
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /api/books/$1
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /api/books/?(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: book-service
            port:
              number: 2600
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: library-ingress-users
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /api/users/?(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: user-service
            port:
              number: 2700
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: library-ingress-frontend
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
